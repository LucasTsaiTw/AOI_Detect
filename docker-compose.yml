services:
  vision-aoi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vision-aoi-app
    ports:
      - "8000:8000"
    volumes:
      # 將本機當前目錄掛載到容器內的 /Code
      # 這樣修改程式碼或增減 dataset/weights 時，容器內會即時同步，不需重新 Build
      - ./:/Code
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
